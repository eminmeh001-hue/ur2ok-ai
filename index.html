<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destek AI</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        #chat-box { height: 400px; overflow-y: auto; padding: 20px; border-bottom: 1px solid #eee; }
        .input-area { display: flex; padding: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; background: #6200ea; color: white; border: none; border-radius: 5px; margin-left: 5px; cursor: pointer; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 5px; max-width: 80%; }
        .bot { background: #eee; align-self: flex-start; }
        .user { background: #6200ea; color: white; align-self: flex-end; margin-left: auto; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div id="chat-box" style="display: flex; flex-direction: column;">
            <div class="message bot">Merhaba! Ben ur2ok-ai. Bugün nasıl hissediyorsun?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Bir şeyler yazın...">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const message = input.value.trim();
            if (!message) return;

            // Kullanıcı mesajını ekle
            chatBox.innerHTML += `<div class="message user">${message}</div>`;
            input.value = '';
            
            // "Düşünüyorum..." mesajı
            const botMsgDiv = document.createElement('div');
            botMsgDiv.className = 'message bot';
            botMsgDiv.innerText = 'Düşünüyorum...';
            chatBox.appendChild(botMsgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                botMsgDiv.innerText = data.reply;
            } catch (error) {
                botMsgDiv.innerText = "Hata oluştu, API anahtarını kontrol et.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
