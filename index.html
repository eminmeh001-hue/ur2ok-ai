<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ur2ok-ai | Yanındayız</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">ur2ok-ai 🌿</h1>
            <p class="text-xs font-light mt-1 opacity-90">Her zaman yanındayız.</p>
        </div>

        <div id="chat" class="h-96 overflow-y-auto p-4 space-y-4 bg-gray-50 flex flex-col">
            <div class="bg-indigo-100 text-indigo-900 p-4 rounded-2xl rounded-tl-none self-start max-w-[85%]">
                Merhaba! Ben ur2ok-ai. Bugün nasıl hissediyorsun?
            </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-100 flex gap-2">
            <input id="userInput" type="text" placeholder="Bir şeyler yazın..." 
                class="flex-1 border border-gray-200 rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <button id="sendBtn" class="bg-indigo-600 text-white p-3 rounded-full hover:bg-indigo-700 transition-all">
                Gönder
            </button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function appendMessage() {
            const text = input.value.trim();
            if (text === "") return;

            // Kullanıcı mesajını ekle
            const userDiv = document.createElement('div');
            userDiv.className = "bg-indigo-600 text-white p-4 rounded-2xl rounded-tr-none self-end max-w-[85%] ml-auto text-sm";
            userDiv.innerText = text;
            chat.appendChild(userDiv);

            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            // Bot yanıtı simülasyonu
            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.className = "bg-white border border-gray-200 text-gray-800 p-4 rounded-2xl rounded-tl-none self-start max-w-[85%] text-sm shadow-sm";
                botDiv.innerText = "Seni dinliyorum... (AI bağlantısı yapıldığında gerçek cevap vereceğim)";
                chat.appendChild(botDiv);
                chat.scrollTop = chat.scrollHeight;
            }, 800);
        }

        btn.onclick = appendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') appendMessage(); };
    </script>
</body>
</html>
