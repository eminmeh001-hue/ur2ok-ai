<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destek AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; height: 80vh; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 18px; max-width: 80%; line-height: 1.4; font-size: 15px; }
        .user-message { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot-message { background: #e4e6eb; color: #050505; align-self: flex-start; border-bottom-left-radius: 4px; }
        #input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: #fff; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #0084ff; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0073e6; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Mesajınızı yazın..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');

        // Sayfa açıldığında botun karşılaması
        window.onload = () => {
            addMessage("Merhaba... Eğer bugün kendini biraz yorgun veya yalnız hissediyorsan, dertleşmek için buradayım. Konuşmak istediğin her an bana yazabilirsin.", 'bot');
        };

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                addMessage(data.answer || "Bir sorun oluştu.", 'bot');
            } catch (e) {
                addMessage("Bağlantı hatası! Lütfen internetini kontrol et.", 'bot');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender === 'user' ? 'user-message' : 'bot-message'}`;
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
